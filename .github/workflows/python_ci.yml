name: Python CI - Nigerian CXR Benchmark Phase 1

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Removed matrix for Phase 1 efficiency (Docker pins Python 3.10); re-enable in Week 3-4 if needed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to latest stable version

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Cache pip dependencies (host-level, for any non-Docker steps)
        uses: actions/cache@v4  # Updated to latest
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install host dependencies (for linting/coverage)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Build Docker Image
        run: docker build -t ncb-phase1:latest .

      - name: Run Tests in Docker
        env:
          CXR_ANON_SECRET: ${{ secrets.CXR_ANON_SECRET }}  # Securely injects the anonymization key
        run: docker run --rm ncb-phase1:latest pytest -v tests/

      - name: Lint with flake8
        run: |
          # Strict: Fail on critical errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Relaxed: Report style/complexity (no fail on CI for early phase)
          flake8 . --count --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with coverage (host-level, for reporting)
        run: |
          export PYTHONPATH="${{ github.workspace }}:$PYTHONPATH"
          pytest --cov=src --cov-report=xml --cov-report=term-missing
          # Optional: Upload to Codecov later (add step with token secret)

      - name: Upload coverage artifact (optional, for review)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml  # Or htmlcov/ if generated